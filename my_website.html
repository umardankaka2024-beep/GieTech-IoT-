<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GieTech-IoT Kano</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Poppins;background:#f5f7fb;color:#222;}

/* HEADER */
header{background:#0b1f3a;position:fixed;width:100%;top:0;z-index:1000;}
.navbar{display:flex;justify-content:space-between;padding:15px 10%;color:white;}
.logo{color:#00d4ff;font-size:22px;font-weight:bold;}
nav ul{display:flex;gap:20px;list-style:none;}
nav a{color:white;text-decoration:none}

/* HERO */
.hero{height:90vh;display:flex;align-items:center;justify-content:center;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1518770660439-4636190af475');
background-size:cover;color:white;text-align:center;padding:20px;}
.hero h1{font-size:45px;}
.btn{padding:12px 25px;background:#00d4ff;border:none;border-radius:20px;cursor:pointer}

/* SECTION */
section{padding:90px 10%}

/* UPDATES */
.updates{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}
.update-box{
  background:#eef4ff;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

/* CONTACT */
.contact-box{background:white;padding:20px;border-radius:10px}
input,textarea{width:100%;padding:10px;margin:8px 0}

/* ADMIN */
.admin-panel{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#0b1f3a;
  color:white;
  padding:15px;
  border-radius:10px;
}
.admin-panel input{width:100%;margin:5px 0;padding:5px}
.admin-btn{background:#00d4ff;border:none;padding:8px;width:100%;cursor:pointer}
.hidden{display:none}

.contact-buttons a{
  display:inline-block;
  margin:5px;
  padding:10px 15px;
  border-radius:8px;
  text-decoration:none;
  color:white;
}
.email-btn{background:#d93025;}
.wa-btn{background:#25D366;}
</style>
</head>

<body>

<header>
  <div class="navbar">
    <div class="logo">GieTech-IoT Kano</div>
    <nav>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#updates">Updates</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero" id="home">
  <div>
    <h1>Welcome to GieTech-IoT Kano</h1>
    <p>Embedded Systems | IoT | Automation</p>
  </div>
</section>

<!-- UPDATES -->
<section id="updates">
  <h2>Latest Updates</h2>
  <div class="updates" id="updatesList">
    <p>No updates yet</p>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Us</h2>

  <div class="contact-box">
    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" placeholder="Message"></textarea>

    <button class="btn" onclick="sendWhatsApp()">Send via WhatsApp</button>

    <div class="contact-buttons">
      <a class="email-btn" id="emailLink">Send Email</a>
      <a class="wa-btn" id="waLink" target="_blank">WhatsApp Direct</a>
    </div>
  </div>
</section>

<!-- ADMIN LOGIN -->
<div class="admin-panel">
  <h4>Admin Login</h4>
  <input type="password" id="adminPass" placeholder="Password">
  <button class="admin-btn" onclick="loginAdmin()">Login</button>

  <div id="adminTools" class="hidden">
    <input type="text" id="updateText" placeholder="Add update">
    <button class="admin-btn" onclick="addUpdate()">Post Update</button>
  </div>
</div>

<script>

/* ===== CONTACT SEPARATION ===== */
function updateLinks(){
  let name=document.getElementById("name").value;
  let email=document.getElementById("email").value;
  let message=document.getElementById("message").value;

  let text=`Name:${name}\nEmail:${email}\nMessage:${message}`;

  document.getElementById("emailLink").href=
  "mailto:giotechiotkano@gmail.com?subject=Message from "+name+"&body="+encodeURIComponent(text);

  document.getElementById("waLink").href=
  "https://wa.me/2348103391740?text="+encodeURIComponent(text);
}

/* WhatsApp button */
function sendWhatsApp(){
  updateLinks();
  document.getElementById("waLink").click();
}

/* ===== ADMIN LOGIN ===== */
function loginAdmin(){
  let pass=document.getElementById("adminPass").value;

  if(pass==="admin123"){
    document.getElementById("adminTools").classList.remove("hidden");
    alert("Admin logged in");
  }else{
    alert("Wrong password");
  }
}

/* ===== ADD UPDATE ===== */
function addUpdate(){
  let text=document.getElementById("updateText").value;

  if(!text) return;

  let updates=JSON.parse(localStorage.getItem("updates"))||[];

  updates.unshift(text);
  localStorage.setItem("updates",JSON.stringify(updates));

  showUpdates();
  document.getElementById("updateText").value="";
}

/* SHOW UPDATES */
function showUpdates(){
  let updates=JSON.parse(localStorage.getItem("updates"))||[];
  let box=document.getElementById("updatesList");

  if(updates.length===0){
    box.innerHTML="<p>No updates yet</p>";
    return;
  }

  box.innerHTML="";
  updates.forEach(u=>{
    box.innerHTML+=`<div class="update-box">${u}</div>`;
  });
}

showUpdates();

</script>

</body>
</html>
